<style>/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:#2f2e2e;}
.nav-bar{display:flex;align-items:center;padding:0 20px;min-height:105px;}
.logo-wrap{flex-shrink:0;margin-right:18px;text-decoration:none;}
.logo-img{width:92px;height:92px;border-radius:50%;object-fit:contain;background:transparent;animation:spin 12s linear infinite;display:block;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.nav-links{display:flex;flex-wrap:wrap;list-style:none;align-items:center;gap:0;margin:0;padding:0;}
.nav-links li a{font-size:11.5px;font-weight:600;color:#fff;text-decoration:none;padding:8px 11px;letter-spacing:.05em;text-transform:uppercase;display:block;white-space:nowrap;transition:opacity .2s;}
.nav-links li a:hover{opacity:.65;}
.nav-links li a.active{color:#e8c0a7;font-weight:800;}
.hamburger{display:none;flex-direction:column;justify-content:center;gap:5px;cursor:pointer;padding:10px 8px;margin-left:auto;background:none;border:none;z-index:10000;position:relative;-webkit-tap-highlight-color:transparent;}
.hamburger span{display:block;width:26px;height:3px;background:#fff;border-radius:2px;transition:all .3s ease;pointer-events:none;}
.hamburger.open span:nth-child(1){transform:translateY(8px) rotate(45deg);}
.hamburger.open span:nth-child(2){opacity:0;transform:scaleX(0);}
.hamburger.open span:nth-child(3){transform:translateY(-8px) rotate(-45deg);}
.mobile-menu{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#2f2e2e;z-index:9999;overflow-y:auto;flex-direction:column;padding:120px 0 2rem;}
.mobile-menu.open{display:flex;}
.mobile-menu a{color:rgba(255,255,255,.85);text-decoration:none;font-size:.95rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:.9rem 1.75rem;border-bottom:1px solid rgba(255,255,255,.06);transition:background .2s,color .2s;}
.mobile-menu a:hover,.mobile-menu a.active{background:rgba(255,255,255,.07);color:#e8c0a7;}
.m-cta{margin:1.25rem 1.75rem 0;display:flex;flex-direction:column;gap:.65rem;}
.m-btn{display:block;text-align:center;padding:.85rem;border-radius:10px;font-weight:700;font-size:.92rem;text-decoration:none;}
.m-btn.wa{background:#25d366;color:#fff;}
.m-btn.phone{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.18);}
@media(max-width:900px){.nav-links{display:none !important;}.hamburger{display:flex;}}

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;}
.wrap{max-width:400px;}
.icon{font-size:5rem;margin-bottom:1.5rem;}
h1{font-size:1.6rem;font-weight:800;margin-bottom:.75rem;color:#e8c0a7;}
p{font-size:.95rem;color:rgba(255,255,255,.7);line-height:1.75;margin-bottom:2rem;}
.btns{display:flex;flex-direction:column;gap:.75rem;}
.btn{display:block;padding:.9rem 1.5rem;border-radius:10px;font-weight:700;font-size:.95rem;text-decoration:none;transition:opacity .2s;}
.btn-wa{background:#25d366;color:#fff;}
.btn-tel{background:#0073b6;color:#fff;}
.btn-reload{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);cursor:pointer;font-size:.95rem;}
.btn-reload:hover,.btn:hover{opacity:.85;}

}

.btn-email-link,.btn-pec-link{display:inline-block;padding:.45rem 1.1rem;border-radius:8px;font-weight:700;font-size:.85rem;text-decoration:none;transition:all .2s;cursor:pointer;}
.btn-email-link{background:#0073b6;color:#fff !important;border:none;}
.btn-email-link:hover{background:#005a8e;transform:translateY(-1px);}
.btn-pec-link{background:#1a1a2e;color:#fff !important;border:none;margin-left:.4rem;}
.btn-pec-link:hover{background:#0d0d1a;transform:translateY(-1px);}

</style>
</head>
<body>
<script>
document.addEventListener('DOMContentLoaded',function(){
  var ham=document.getElementById('hamburger');
  var mob=document.getElementById('mobileMenu');
  if(!ham||!mob)return;
  ham.addEventListener('click',function(e){
    e.preventDefault();e.stopPropagation();
    var open=mob.classList.contains('open');
    ham.classList.toggle('open',!open);
    mob.classList.toggle('open',!open);
    document.body.style.overflow=open?'':'hidden';
  });
  mob.querySelectorAll('a').forEach(function(a){
    a.addEventListener('click',function(){
      ham.classList.remove('open');
      mob.classList.remove('open');
      document.body.style.overflow='';
    });
  });
});
</script>
